<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重启遮罩 Demo</title>
    <link rel="stylesheet" href="../../dist/boblog-ui.css">
</head>
<body style="margin:0; background:#f5f5f5;">

<!-- 重启遮罩：默认隐藏，点击按钮激活，3秒后自动关闭 -->
<div class="boblog-restart-overlay" id="restartOverlay">
    <div class="boblog-text-center boblog-text-white">
        <div class="boblog-spinner boblog-mb-3"></div>
        <h4>服务正在重启...</h4>
        <p class="boblog-text-gray">请稍候，页面将自动刷新</p>
        <p id="countdown" class="boblog-mt-3" style="color:#fff;"></p>
    </div>
</div>

<!-- 触发按钮 -->
<div style="display:flex; align-items:center; justify-content:center; height:100vh;">
    <button class="boblog-btn boblog-btn-danger" id="btnRestart">点击演示重启遮罩</button>
</div>

<script>
(function() {
    var btn = document.getElementById('btnRestart');
    var overlay = document.getElementById('restartOverlay');
    var countdown = document.getElementById('countdown');
    var timer = null;

    btn.addEventListener('click', function() {
        overlay.classList.add('show');
        var sec = 3;
        countdown.textContent = sec + ' 秒后自动关闭';
        timer = setInterval(function() {
            sec--;
            if (sec <= 0) {
                clearInterval(timer);
                overlay.classList.remove('show');
                countdown.textContent = '';
            } else {
                countdown.textContent = sec + ' 秒后自动关闭';
            }
        }, 1000);
    });
})();
</script>

</body>
</html>
