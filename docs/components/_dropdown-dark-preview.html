<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深色背景下拉菜单预览</title>
    <link rel="stylesheet" href="../../dist/boblog-ui.css">
</head>
<body style="margin:0;">

<!-- 深色顶栏容器 -->
<div class="boblog-admin-topbar" id="demo-dark">
    <!-- 下拉菜单 -->
    <div class="boblog-dropdown boblog-dropdown-match-width">
        <!-- toggle 添加 .boblog-text-white 使文字为白色 -->
        <button class="boblog-dropdown-toggle boblog-text-white"
                onclick="this.closest('.boblog-dropdown').querySelector('.boblog-dropdown-menu').classList.toggle('show')">
            管理员 ▼
        </button>
        <!-- 下拉面板保持浅色背景，保证菜单项可读性 -->
        <div class="boblog-dropdown-menu boblog-dropdown-menu-left">
            <a class="boblog-dropdown-item" href="#">个人资料</a>
            <a class="boblog-dropdown-item" href="#">修改密码</a>
            <div class="boblog-dropdown-divider"></div>
            <a class="boblog-dropdown-item" href="#">退出登录</a>
        </div>
    </div>
</div>

<!-- 点击空白区域关闭下拉菜单 -->
<script>
document.addEventListener('click', function(e) {
    if (!e.target.closest('.boblog-dropdown')) {
        document.querySelectorAll('.boblog-dropdown-menu.show').forEach(function(m) {
            m.classList.remove('show');
        });
    }
});
</script>

</body>
</html>
